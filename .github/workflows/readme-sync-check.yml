name: README Sync Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'README.md'
      - 'README_ja.md'
      - 'Packages/src/README.md'
      - 'Packages/src/README_ja.md'
      - 'scripts/sync-readmes.sh'

jobs:
  check-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify README files are in sync
        run: sh scripts/sync-readmes.sh --check
